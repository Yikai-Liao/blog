{% extends "base.html" %}
{% import "macros.html" as macros %}

{% block content %}
  {% set posts = get_section(path="posts/_index.md") %}
  <section class="post-list card-list">
    {% for post in posts.pages %}
      {% if not post.draft %}
        {{ macros::post_card(page=post, index=loop.index0) }}
      {% endif %}
    {% endfor %}
  </section>
{% endblock content %}
