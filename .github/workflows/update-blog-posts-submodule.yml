name: Update Blog Posts Submodule

on:
  repository_dispatch:
    types: [blog-posts-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          token: ${{ secrets.BLOG_POSTS_TOKEN }}

      - name: Update contents submodule
        run: git submodule update --remote contents

      - name: Commit submodule pointer
        run: |
          if git diff --quiet -- contents; then
            echo "contents submodule is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contents
          git commit -m "Update blog-posts submodule"
          git push
