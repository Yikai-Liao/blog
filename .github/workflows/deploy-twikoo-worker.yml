name: Deploy Twikoo Worker

on:
  push:
    branches: [ main ]
    paths:
      - comments/**
      - .github/workflows/deploy-twikoo-worker.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-twikoo-worker:
    if: ${{ vars.TWIKOO_WORKER_ENABLED == 'true' && vars.TWIKOO_D1_DATABASE_ID != '' }}
    runs-on: ubuntu-latest
    env:
      TWIKOO_D1_DATABASE_ID: ${{ vars.TWIKOO_D1_DATABASE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.10.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: comments/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: comments
        run: pnpm install --frozen-lockfile

      - name: Generate config
        working-directory: comments
        run: pnpm run write-config

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: comments
          command: deploy --config wrangler.generated.jsonc --minify
