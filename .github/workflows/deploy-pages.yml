name: Deploy Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-cloudflare-pages:
    if: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
      CLOUDFLARE_PAGES_SITE_URL: ${{ vars.CLOUDFLARE_PAGES_SITE_URL }}
      PUBLIC_TWIKOO_ENV_ID: ${{ vars.PUBLIC_TWIKOO_ENV_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          token: ${{ secrets.BLOG_POSTS_TOKEN || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.10.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Resolve Cloudflare Pages site settings
        run: |
          default_site="https://${CLOUDFLARE_PAGES_PROJECT_NAME}.pages.dev"
          echo "PUBLIC_SITE_URL=${CLOUDFLARE_PAGES_SITE_URL:-$default_site}" >> "$GITHUB_ENV"
          echo "PUBLIC_BASE_PATH=/" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Cloudflare Pages site
        run: pnpm build
        env:
          GITHUB_TOKEN: ${{ secrets.GH_CARD_TOKEN || github.token }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
