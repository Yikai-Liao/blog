name: Deploy Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-github-pages:
    if: ${{ vars.GITHUB_PAGES_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITHUB_PAGES_SITE_URL: ${{ vars.GITHUB_PAGES_SITE_URL }}
      GITHUB_PAGES_BASE_PATH: ${{ vars.GITHUB_PAGES_BASE_PATH }}
      PUBLIC_TWIKOO_ENV_ID: ${{ vars.PUBLIC_TWIKOO_ENV_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Resolve GitHub Pages site settings
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_lower="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          repo_lower="$(printf '%s' "$repo_name" | tr '[:upper:]' '[:lower:]')"

          default_site="https://${owner_lower}.github.io"
          if [ "$repo_lower" = "${owner_lower}.github.io" ]; then
            default_base="/"
          else
            default_base="/${repo_name}"
          fi

          echo "PUBLIC_SITE_URL=${GITHUB_PAGES_SITE_URL:-$default_site}" >> "$GITHUB_ENV"
          echo "PUBLIC_BASE_PATH=${GITHUB_PAGES_BASE_PATH:-$default_base}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build GitHub Pages site
        run: pnpm build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy-github-pages:
    if: ${{ vars.GITHUB_PAGES_ENABLED == 'true' }}
    needs: build-github-pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  deploy-cloudflare-pages:
    if: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
      CLOUDFLARE_PAGES_SITE_URL: ${{ vars.CLOUDFLARE_PAGES_SITE_URL }}
      PUBLIC_TWIKOO_ENV_ID: ${{ vars.PUBLIC_TWIKOO_ENV_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Resolve Cloudflare Pages site settings
        run: |
          default_site="https://${CLOUDFLARE_PAGES_PROJECT_NAME}.pages.dev"
          echo "PUBLIC_SITE_URL=${CLOUDFLARE_PAGES_SITE_URL:-$default_site}" >> "$GITHUB_ENV"
          echo "PUBLIC_BASE_PATH=/" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Cloudflare Pages site
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: comments
          command: pages deploy ../dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-twikoo-worker:
    if: ${{ vars.TWIKOO_WORKER_ENABLED == 'true' && vars.TWIKOO_D1_DATABASE_ID != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TWIKOO_D1_DATABASE_ID: ${{ vars.TWIKOO_D1_DATABASE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Install Twikoo Worker dependencies
        working-directory: comments
        run: pnpm install --frozen-lockfile

      - name: Generate Twikoo Worker config
        working-directory: comments
        run: pnpm run write-config

      - name: Deploy Twikoo Worker
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: comments
          command: deploy --config wrangler.generated.jsonc --minify
